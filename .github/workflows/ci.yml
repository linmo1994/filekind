name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: python -m pip install --upgrade pip setuptools wheel && pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

  build:
    name: Build (${{ matrix.platform }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            artifact: filekind-macos
          - os: windows-latest
            platform: windows
            artifact: filekind-windows
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build dependencies
        run: python -m pip install --upgrade pip setuptools wheel && pip install -e ".[dev,build]"

      - name: Build executable (PyInstaller)
        run: pyinstaller --noconfirm --clean filekind.spec

      - name: Prepare distribution bundle
        run: python scripts/bundle_dist.py

      - name: Smoke test binary
        run: |
          python - <<'PY'
          import subprocess
          import sys
          from pathlib import Path

          platform = "${{ matrix.platform }}"
          exe = Path("dist/filekind/filekind.exe" if platform == "windows" else "dist/filekind/filekind")
          if not exe.is_file():
              print(f"Missing binary: {exe}", file=sys.stderr)
              raise SystemExit(1)

          result = subprocess.run(
              [exe.name, "--help"],
              cwd=exe.parent,
              capture_output=True,
              text=True,
              encoding="utf-8",
              errors="replace",
          )
          print((result.stdout or result.stderr)[:400])
          raise SystemExit(result.returncode)
          PY

      - name: Archive build (macOS)
        if: matrix.platform == 'macos'
        run: cd dist && zip -r ../${{ matrix.artifact }}.zip filekind

      - name: Archive build (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: Compress-Archive -Path dist/filekind -DestinationPath ${{ matrix.artifact }}.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip
          if-no-files-found: error
          retention-days: 30
