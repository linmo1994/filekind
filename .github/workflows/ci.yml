name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: python -m pip install --upgrade pip setuptools wheel && pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

  build:
    name: Build (${{ matrix.platform }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            artifact: filekind-macos
          - os: windows-latest
            platform: windows
            artifact: filekind-windows
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build dependencies
        run: python -m pip install --upgrade pip setuptools wheel && pip install -e ".[dev,build,llm,ocr]"

      - name: Build executable (PyInstaller)
        run: pyinstaller --noconfirm --clean filekind.spec

      - name: Prepare distribution bundle
        run: python scripts/bundle_dist.py

      - name: Smoke test binary
        run: python scripts/smoke_test_build.py ${{ matrix.platform }}

      - name: Archive build (macOS)
        if: matrix.platform == 'macos'
        run: cd dist && zip -r ../${{ matrix.artifact }}.zip filekind

      - name: Archive build (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: tar -a -c -f ${{ matrix.artifact }}.zip -C dist filekind

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip
          if-no-files-found: error
          retention-days: 30
